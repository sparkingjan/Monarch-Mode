<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ascendra - Hunter Profile</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-abyss text-slate-100 min-h-screen">
  <div class="bg-grid"></div>
  <a class="profile-link" href="login.html" aria-label="Open login">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M20 21a8 8 0 0 0-16 0"></path>
      <circle cx="12" cy="8" r="4"></circle>
    </svg>
  </a>

  <main
    class="relative z-10 pb-12"
    x-data="{
      loading: true,
      error: '',
      user: null,
      uid: '',
      apiBase() {
        return window.MONARCH_CONFIG?.backendBaseUrl || 'https://monarch-mode.vercel.app/api/v1';
      },
      parseUid() {
        const params = new URLSearchParams(window.location.search);
        return (params.get('uid') || '').trim();
      },
      goalLabel(goal) {
        if (goal === 'bulk') return 'Lean Bulk';
        if (goal === 'cut') return 'Fat Loss (Cut)';
        return 'Maintain';
      },
      rankKey(rank = '') {
        const value = String(rank || '').toLowerCase();
        if (value.includes('s++')) return 'spp';
        if (value.includes('s-rank') || value === 's') return 's';
        if (value.includes('a-rank') || value === 'a') return 'a';
        if (value.includes('b-rank') || value === 'b') return 'b';
        if (value.includes('c-rank') || value === 'c') return 'c';
        if (value.includes('d-rank') || value === 'd') return 'd';
        return 'e';
      },
      rankPillClass(rank = '') {
        return `rank-pill-${this.rankKey(rank)}`;
      },
      async init() {
        this.uid = this.parseUid();
        if (!this.uid) {
          this.error = 'Missing hunter UID in URL.';
          this.loading = false;
          return;
        }
        try {
          const response = await fetch(`${this.apiBase()}/users/${encodeURIComponent(this.uid)}/public`);
          if (!response.ok) {
            this.error = response.status === 404 ? 'Hunter not found.' : `Failed to load hunter profile (${response.status}).`;
            this.loading = false;
            return;
          }
          this.user = await response.json();
          this.loading = false;
        } catch (_) {
          this.error = 'Could not connect to profile service.';
          this.loading = false;
        }
      }
    }"
    x-init="init()"
  >
    <div class="nav-shell">
      <button class="menu-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="primary-nav">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav id="primary-nav" class="top-nav">
        <a href="index.html">Main</a>
        <a href="quests.html">Quests</a>
        <a href="diet.html">Diet</a>
        <a href="fitness.html">Looksmaxxing</a>
        <a href="progress.html">Progress</a>
        <a href="leaderboard.html">Leaderboard</a>
      </nav>
    </div>

    <section class="w-[92%] lg:w-[70%] max-w-none mx-auto px-4 md:px-8 mt-8">
      <header class="panel rounded-2xl border border-cyan-400/30 p-6">
        <p class="text-cyan-300 tracking-[0.2em] uppercase text-xs">Hunter Record</p>
        <h1 class="title-font text-3xl md:text-4xl mt-2">Public Profile</h1>
      </header>

      <div x-show="loading" class="mt-6 panel rounded-xl border border-slate-700/85 p-4 text-slate-300">
        Loading hunter profile...
      </div>
      <div x-show="error" class="mt-6 panel rounded-xl border border-red-500/50 p-4 text-red-200" x-text="error"></div>

      <article x-show="user && !loading && !error" class="mt-6 relative overflow-hidden rounded-2xl border border-cyan-300/45 p-6 panel hunter-public-card">
        <div class="relative z-10 flex items-center justify-between gap-4 hunter-public-head">
          <div class="flex items-center gap-4 hunter-public-identity">
            <div class="h-16 w-16 rounded-xl border border-cyan-200/60 bg-slate-900/80 flex items-center justify-center hunter-public-avatar">
              <span class="title-font text-2xl text-cyan-100" x-text="(user?.name || 'P').charAt(0).toUpperCase()">
              </span>
            </div>
            <div>
              <p class="text-xs uppercase tracking-[0.12em] text-cyan-300">Hunter</p>
              <div class="flex items-center gap-2 hunter-public-name-row">
                <h2 class="title-font text-2xl hunter-public-name" x-text="user?.name || 'Player Hunter'"></h2>
                <span x-show="user?.is_admin || user?.isAdmin" class="px-2 py-0.5 rounded-full border border-rose-300/70 bg-rose-500/20 text-rose-100 text-[10px] uppercase tracking-[0.1em]">Admin</span>
              </div>
              <p class="hunter-rank-pill mt-1" :class="rankPillClass(user?.rank || 'E-Rank')" x-text="user?.rank || 'E-Rank'"></p>
              <p class="text-xs text-slate-300 mt-1" x-text="`UID: ${user?.uid || ''}`"></p>
            </div>
          </div>
          <p class="title-font text-2xl text-cyan-200 hunter-public-xp" x-text="`${Number(user?.xp || 0).toLocaleString()} XP`"></p>
        </div>

        <div class="relative z-10 mt-6 grid md:grid-cols-6 gap-3">
          <div class="panel-dark rounded-xl p-4">
            <p class="text-xs uppercase tracking-[0.14em] text-cyan-300">Level</p>
            <p class="mt-2 text-2xl title-font" x-text="user?.level || 1"></p>
          </div>
          <div class="panel-dark rounded-xl p-4">
            <p class="text-xs uppercase tracking-[0.14em] text-cyan-300">Survival Streak</p>
            <p class="mt-2 text-2xl title-font" x-text="user?.survival_streak || 0"></p>
          </div>
          <div class="panel-dark rounded-xl p-4">
            <p class="text-xs uppercase tracking-[0.14em] text-cyan-300">Goal</p>
            <p class="mt-2 text-2xl title-font" x-text="goalLabel(user?.goal)"></p>
          </div>
          <div class="panel-dark rounded-xl p-4">
            <p class="text-xs uppercase tracking-[0.14em] text-cyan-300">Height</p>
            <p class="mt-2 text-2xl title-font" x-text="user?.height_cm ? `${user.height_cm} cm` : '-'"></p>
          </div>
          <div class="panel-dark rounded-xl p-4">
            <p class="text-xs uppercase tracking-[0.14em] text-cyan-300">Weight</p>
            <p class="mt-2 text-2xl title-font" x-text="user?.weight_kg ? `${user.weight_kg} kg` : '-'"></p>
          </div>
          <div class="panel-dark rounded-xl p-4">
            <p class="text-xs uppercase tracking-[0.14em] text-cyan-300">Age</p>
            <p class="mt-2 text-2xl title-font" x-text="Number.isFinite(user?.age) ? user.age : '-'"></p>
          </div>
        </div>

      </article>
    </section>
  </main>

  <script src="web-config.js"></script>
  <script src="auth-guard.js"></script>
  <script src="nav.js"></script>
</body>
</html>
