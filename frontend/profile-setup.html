<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monarch Mode - Complete Profile</title>
  <link rel="icon" type="image/svg+xml" href="favicon-light.svg" media="(prefers-color-scheme: light)" />
  <link rel="icon" type="image/svg+xml" href="favicon-dark.svg" media="(prefers-color-scheme: dark)" />
  <link rel="icon" type="image/svg+xml" href="favicon-dark.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-abyss text-slate-100 min-h-screen">
  <div class="bg-grid"></div>

  <main class="auth-shell relative z-10">
    <section class="auth-card">
      <p class="text-cyan-300 tracking-[0.2em] uppercase text-xs">Profile Setup</p>
      <h1 class="title-font text-3xl mt-2">Complete Your Profile</h1>
      <p class="text-slate-400 mt-1 text-sm">Set height, weight, DOB, and goal to generate your personal plan.</p>

      <form id="profile-setup-form" class="mt-5 space-y-3" action="#" method="post">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <input class="auth-input" type="number" name="heightCm" min="120" max="230" step="1" placeholder="Height (cm)" required />
          <input class="auth-input" type="number" name="weightKg" min="35" max="250" step="1" placeholder="Weight (kg)" required />
        </div>
        <input class="auth-input" type="date" name="dob" max="" placeholder="Date of Birth" required />
        <select class="auth-input" name="goal" required>
          <option value="maintain">Goal: Maintain / Recomp</option>
          <option value="cut">Goal: Fat Loss</option>
          <option value="bulk">Goal: Lean Bulk</option>
        </select>
        <button type="submit" class="hero-cta w-full">SAVE AND CONTINUE</button>
      </form>

      <p id="profile-setup-error" class="text-sm text-rose-300 mt-3 hidden"></p>
      <p id="profile-setup-info" class="text-sm text-cyan-300 mt-2 hidden"></p>
    </section>
  </main>

  <script src="web-config.js"></script>
  <script src="auth-guard.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script>
    (function () {
      const form = document.getElementById('profile-setup-form');
      const errorEl = document.getElementById('profile-setup-error');
      const infoEl = document.getElementById('profile-setup-info');
      if (!form) return;
      const dobInput = form.elements.dob;
      if (dobInput) {
        dobInput.max = new Date().toISOString().slice(0, 10);
      }

      const cfg = window.MONARCH_CONFIG || {};
      const firebaseCfg = cfg.firebase || {};
      const hasFirebaseCfg = Boolean(firebaseCfg.apiKey && firebaseCfg.authDomain && firebaseCfg.projectId);

      function showError(message) {
        if (infoEl) infoEl.classList.add('hidden');
        if (!errorEl) return;
        errorEl.textContent = message;
        errorEl.classList.remove('hidden');
      }

      function showInfo(message) {
        if (errorEl) errorEl.classList.add('hidden');
        if (!infoEl) return;
        infoEl.textContent = message;
        infoEl.classList.remove('hidden');
      }

      function normalizeDobInput(value) {
        if (typeof value !== 'string') return '';
        const trimmed = value.trim();
        if (!/^\d{4}-\d{2}-\d{2}$/.test(trimmed)) return '';
        return trimmed;
      }

      async function getToken() {
        const storedToken = localStorage.getItem('firebase-id-token');
        if (!hasFirebaseCfg) return storedToken;
        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseCfg);
        }
        const user = firebase.auth().currentUser;
        if (user) {
          const freshToken = await user.getIdToken(true);
          localStorage.setItem('firebase-id-token', freshToken);
          return freshToken;
        }
        return storedToken;
      }

      form.addEventListener('submit', function (event) {
        event.preventDefault();
        if (errorEl) errorEl.classList.add('hidden');
        if (infoEl) infoEl.classList.add('hidden');

        const payload = {
          heightCm: Number(form.elements.heightCm?.value || 0),
          weightKg: Number(form.elements.weightKg?.value || 0),
          dob: normalizeDobInput(form.elements.dob?.value || ''),
          goal: form.elements.goal?.value || 'maintain'
        };
        if (!payload.dob) {
          showError('Enter a valid Date of Birth.');
          return;
        }

        (async function run() {
          try {
            const token = await getToken();
            if (!token) {
              showError('Session missing. Please login again.');
              return;
            }

            const baseUrl = cfg.backendBaseUrl || 'http://127.0.0.1:8000/api/v1';
            const meResponse = await fetch(baseUrl + '/users/me', {
              method: 'GET',
              headers: { Authorization: 'Bearer ' + token }
            });
            if (!meResponse.ok) {
              showError('Could not load account profile. Please try again.');
              return;
            }
            const me = await meResponse.json();

            const updateResponse = await fetch(baseUrl + '/users/me/profile', {
              method: 'PUT',
              headers: {
                'Content-Type': 'application/json',
                Authorization: 'Bearer ' + token
              },
              body: JSON.stringify({
                name: me.name || 'Player Hunter',
                height_cm: payload.heightCm,
                weight_kg: payload.weightKg,
                dob: payload.dob,
                goal: payload.goal
              })
            });
            if (!updateResponse.ok) {
              showError('Could not save profile data. Please try again.');
              return;
            }

            localStorage.setItem('hunter-account-profile', JSON.stringify({
              name: me.name || 'Player Hunter',
              email: me.email || '',
              heightCm: payload.heightCm,
              weightKg: payload.weightKg,
              dob: payload.dob,
              goal: payload.goal,
              isAdmin: Boolean(me.is_admin || me.isAdmin),
              updatedAt: new Date().toISOString()
            }));

            showInfo('Profile saved. Redirecting...');
            setTimeout(function () {
              window.location.href = 'index.html';
            }, 450);
          } catch (error) {
            showError(error?.message || 'Failed to save profile.');
          }
        }());
      });
    }());
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>
  <script defer src="lenis-init.js"></script>
</body>
</html>
